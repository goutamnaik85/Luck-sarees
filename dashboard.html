<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Admin — Lucky Collection</title>
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
<style>
  .admin-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--maroon-dark); color: rgba(255,255,255,0.85); padding: var(--space-6) var(--space-4); }
  .admin-sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.1); color: #fff; }
  .admin-main { padding: var(--space-6) var(--space-7); background: var(--ivory); }
  .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: var(--space-5); }
  .stat-card .num { font-family: var(--font-display); font-size: 1.9rem; font-weight: 700; color: var(--maroon-dark); }
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; }
  .bar-chart .bar { flex: 1; background: var(--gold); border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s ease; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } .admin-sidebar { display: flex; overflow-x: auto; padding: var(--space-3); } .admin-sidebar a { white-space: nowrap; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="logo" style="color:#fff;margin-bottom:var(--space-6)">Lucky<span style="color:var(--gold-light)">Admin</span></div>
    <a href="/admin/dashboard.html" class="active">📊 Dashboard</a>
    <a href="/admin/products.html">🧵 Products</a>
    <a href="/admin/orders.html">📦 Orders</a>
    <a href="/admin/customers.html">👥 Customers</a>
    <a href="/admin/coupons.html">🏷 Coupons</a>
    <a href="/index.html">🌐 View Store</a>
    <a href="#" data-logout>↪ Logout</a>
  </aside>
  <main class="admin-main">
    <div class="flex-between mb-2">
      <h1>Dashboard</h1>
      <span id="admin-name" style="font-size:0.88rem;color:var(--ink-soft)"></span>
    </div>
    <div class="grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:var(--space-6)">
      <div class="stat-card"><div style="font-size:0.8rem;color:var(--ink-soft)">Total Revenue</div><div class="num" id="stat-revenue">—</div></div>
      <div class="stat-card"><div style="font-size:0.8rem;color:var(--ink-soft)">Total Orders</div><div class="num" id="stat-orders">—</div></div>
      <div class="stat-card"><div style="font-size:0.8rem;color:var(--ink-soft)">Pending Orders</div><div class="num" id="stat-pending">—</div></div>
      <div class="stat-card"><div style="font-size:0.8rem;color:var(--ink-soft)">Avg. Order Value</div><div class="num" id="stat-aov">—</div></div>
    </div>
    <div class="stat-card mb-2">
      <h4 class="mb-1">Revenue — Last 14 Days</h4>
      <div class="bar-chart" id="revenue-chart"></div>
    </div>
    <div class="stat-card">
      <div class="flex-between mb-1"><h4>Latest Orders</h4><a href="/admin/orders.html" class="btn btn-sm btn-outline">View All</a></div>
      <table style="width:100%;border-collapse:collapse" id="latest-orders-table">
        <thead><tr style="text-align:left;font-size:0.78rem;color:var(--ink-soft);text-transform:uppercase"><th style="padding:8px 0">Order</th><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
        <tbody id="latest-orders-body"></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { requireAdmin, computeDashboardAnalytics } from "/js/admin.js";
  import { formatPrice } from "/js/products.js";

  requireAdmin(async (user, profile) => {
    document.getElementById("admin-name").textContent = profile.name || user.email;
    const data = await computeDashboardAnalytics();
    document.getElementById("stat-revenue").textContent = formatPrice(data.revenue);
    document.getElementById("stat-orders").textContent = data.totalOrders;
    document.getElementById("stat-pending").textContent = data.pending;
    document.getElementById("stat-aov").textContent = formatPrice(data.avgOrderValue);

    const days = Object.entries(data.revenueByDay);
    const max = Math.max(...days.map(([, v]) => v), 1);
    document.getElementById("revenue-chart").innerHTML = days.map(([date, val]) => {
      const h = Math.max((val / max) * 150, 2);
      const label = new Date(date).getDate();
      return `<div class="bar" style="height:${h}px" title="${date}: ${formatPrice(val)}"></div>`;
    }).join("");

    document.getElementById("latest-orders-body").innerHTML = data.recentOrders.map(o => `
      <tr style="border-top:1px solid var(--line)">
        <td style="padding:10px 0">#${o.id.slice(0,6).toUpperCase()}</td>
        <td>${o.address?.fullName || "—"}</td>
        <td>${formatPrice(o.totals?.total || 0)}</td>
        <td><span class="status-pill status-${(o.status||"pending").toLowerCase()}">${o.status}</span></td>
      </tr>`).join("") || `<tr><td colspan="4" style="padding:16px 0;color:var(--ink-soft)">No orders yet.</td></tr>`;
  });

  document.querySelector("[data-logout]")?.addEventListener("click", async (e) => {
    e.preventDefault();
    const { logoutUser } = await import("/js/auth.js");
    logoutUser();
  });
</script>
</body>
</html>
