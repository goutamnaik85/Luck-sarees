<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Failed — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<header class="navbar"><div class="nav-inner"><a href="/index.html" class="logo">Lucky<span>Collection</span></a></div></header>

<section class="section">
  <div class="container text-center" style="max-width:560px">
    <div style="width:88px;height:88px;border-radius:50%;background:#FBE0DE;color:var(--danger);font-size:2.6rem;display:flex;align-items:center;justify-content:center;margin:0 auto var(--space-5)">✕</div>
    <h1>Payment Failed</h1>
    <p class="mt-1" id="fail-reason">Something went wrong while processing your payment. Your card or account has not been charged.</p>
    <div class="flex" style="gap:12px;justify-content:center;margin-top:var(--space-6)">
      <a href="/checkout.html" class="btn btn-primary">Try Again</a>
      <a href="/contact.html" class="btn btn-outline">Contact Support</a>
    </div>
  </div>
</section>

<script>
  const reason = new URLSearchParams(location.search).get("reason");
  if (reason) document.getElementById("fail-reason").textContent = reason;
</script>
</body>
</html>
