<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products — Admin — Lucky Collection</title>
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
<style>
  .admin-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--maroon-dark); color: rgba(255,255,255,0.85); padding: var(--space-6) var(--space-4); }
  .admin-sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.1); color: #fff; }
  .admin-main { padding: var(--space-6) var(--space-7); background: var(--ivory); }
  .admin-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
  .admin-table th { text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--ink-soft); padding: 12px 14px; background: var(--ivory-deep); }
  .admin-table td { padding: 12px 14px; border-top: 1px solid var(--line); font-size: 0.88rem; vertical-align: middle; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(36,21,18,0.5); display: none; align-items: center; justify-content: center; z-index: 400; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; border-radius: 14px; padding: var(--space-6); max-width: 560px; width: 92%; max-height: 88vh; overflow-y: auto; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } .admin-sidebar { display: flex; overflow-x: auto; padding: var(--space-3); } .admin-sidebar a { white-space: nowrap; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="logo" style="color:#fff;margin-bottom:var(--space-6)">Lucky<span style="color:var(--gold-light)">Admin</span></div>
    <a href="/admin/dashboard.html">📊 Dashboard</a>
    <a href="/admin/products.html" class="active">🧵 Products</a>
    <a href="/admin/orders.html">📦 Orders</a>
    <a href="/admin/customers.html">👥 Customers</a>
    <a href="/admin/coupons.html">🏷 Coupons</a>
    <a href="/index.html">🌐 View Store</a>
    <a href="#" data-logout>↪ Logout</a>
  </aside>
  <main class="admin-main">
    <div class="flex-between mb-2">
      <h1>Products</h1>
      <button class="btn btn-primary" id="add-product-btn">+ Add Product</button>
    </div>
    <table class="admin-table">
      <thead><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="products-table-body"><tr><td colspan="7" style="padding:20px">Loading…</td></tr></tbody>
    </table>
  </main>
</div>

<div class="modal-overlay" id="product-modal">
  <div class="modal-box">
    <h3 class="mb-2" id="modal-title">Add Product</h3>
    <form id="product-form">
      <input type="hidden" name="id">
      <div class="form-row-2">
        <div class="form-group"><label>Product Name</label><input type="text" name="name" required></div>
        <div class="form-group"><label>SKU</label><input type="text" name="sku" required></div>
      </div>
      <div class="form-group"><label>Description</label><textarea name="description" rows="3"></textarea></div>
      <div class="form-row-2">
        <div class="form-group"><label>Category</label><select name="category" required><option value="silk">Silk</option><option value="cotton">Cotton</option><option value="designer">Designer</option></select></div>
        <div class="form-group"><label>Fabric</label><input type="text" name="fabric" placeholder="e.g. Kanjivaram Silk"></div>
      </div>
      <div class="form-row-2">
        <div class="form-group"><label>MRP (₹)</label><input type="number" name="mrp" required></div>
        <div class="form-group"><label>Selling Price (₹)</label><input type="number" name="price" required></div>
      </div>
      <div class="form-row-2">
        <div class="form-group"><label>Stock Quantity</label><input type="number" name="stock" required></div>
        <div class="form-group"><label>Color</label><input type="text" name="color"></div>
      </div>
      <div class="form-row-2">
        <div class="form-group"><label>Occasion</label><input type="text" name="occasion" placeholder="Wedding, Festival..."></div>
        <div class="form-group"><label>Weight</label><input type="text" name="weight" placeholder="e.g. 700g"></div>
      </div>
      <div class="form-group"><label>Product Image</label><input type="file" name="image" accept="image/*"></div>
      <div class="form-group">
        <label style="display:flex;gap:16px;flex-wrap:wrap;font-weight:400">
          <span><input type="checkbox" name="featured"> Featured</span>
          <span><input type="checkbox" name="trending"> Trending</span>
          <span><input type="checkbox" name="bestSeller"> Best Seller</span>
          <span><input type="checkbox" name="active" checked> Active</span>
        </label>
      </div>
      <div class="flex" style="gap:10px;margin-top:var(--space-4)">
        <button type="submit" class="btn btn-primary" style="flex:1" id="save-product-btn">Save Product</button>
        <button type="button" class="btn btn-outline" id="cancel-product-btn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { requireAdmin, adminFetchProducts, adminCreateProduct, adminUpdateProduct, adminDeleteProduct, adminUploadProductImage } from "/js/admin.js";
  import { formatPrice } from "/js/products.js";
  import { showToast } from "/js/script.js";

  let products = [];

  function renderTable() {
    const body = document.getElementById("products-table-body");
    if (!products.length) { body.innerHTML = `<tr><td colspan="7" style="padding:20px;color:var(--ink-soft)">No products yet. Add your first one!</td></tr>`; return; }
    body.innerHTML = products.map(p => `
      <tr>
        <td><img src="${p.images?.[0] || '/images/placeholder-saree.jpg'}" style="width:44px;height:56px;object-fit:cover;border-radius:6px"></td>
        <td>${p.name}</td>
        <td>${p.category}</td>
        <td>${formatPrice(p.price)}</td>
        <td>${p.stock}</td>
        <td><span class="status-pill ${p.active ? 'status-delivered' : 'status-cancelled'}">${p.active ? "Active" : "Inactive"}</span></td>
        <td>
          <button class="btn btn-sm btn-outline" data-edit="${p.id}">Edit</button>
          <button class="btn btn-sm btn-ghost" style="color:var(--danger)" data-delete="${p.id}">Delete</button>
        </td>
      </tr>`).join("");

    body.querySelectorAll("[data-edit]").forEach(btn => btn.addEventListener("click", () => openModal(products.find(p => p.id === btn.dataset.edit))));
    body.querySelectorAll("[data-delete]").forEach(btn => btn.addEventListener("click", async () => {
      if (!confirm("Delete this product? This cannot be undone.")) return;
      await adminDeleteProduct(btn.dataset.delete);
      products = products.filter(p => p.id !== btn.dataset.delete);
      renderTable();
      showToast("Product deleted", "success");
    }));
  }

  function openModal(product = null) {
    const form = document.getElementById("product-form");
    form.reset();
    document.getElementById("modal-title").textContent = product ? "Edit Product" : "Add Product";
    if (product) {
      form.id.value = product.id;
      for (const key of ["name","sku","description","category","fabric","mrp","price","stock","color","occasion","weight"]) {
        if (form[key]) form[key].value = product[key] ?? "";
      }
      form.featured.checked = !!product.featured;
      form.trending.checked = !!product.trending;
      form.bestSeller.checked = !!product.bestSeller;
      form.active.checked = product.active !== false;
    }
    document.getElementById("product-modal").classList.add("open");
  }
  function closeModal() { document.getElementById("product-modal").classList.remove("open"); }

  document.getElementById("add-product-btn").addEventListener("click", () => openModal());
  document.getElementById("cancel-product-btn").addEventListener("click", closeModal);

  document.getElementById("product-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById("save-product-btn");
    btn.disabled = true; btn.innerHTML = '<span class="spinner light"></span> Saving…';
    try {
      const data = {
        name: form.name.value, sku: form.sku.value, description: form.description.value,
        category: form.category.value, fabric: form.fabric.value,
        mrp: Number(form.mrp.value), price: Number(form.price.value), stock: Number(form.stock.value),
        color: form.color.value, occasion: form.occasion.value, weight: form.weight.value,
        featured: form.featured.checked, trending: form.trending.checked, bestSeller: form.bestSeller.checked,
        active: form.active.checked
      };
      if (form.image.files[0]) {
        const url = await adminUploadProductImage(form.image.files[0], data.sku);
        data.images = [url];
      }
      if (form.id.value) {
        await adminUpdateProduct(form.id.value, data);
        products = products.map(p => p.id === form.id.value ? { ...p, ...data } : p);
        showToast("Product updated", "success");
      } else {
        const id = await adminCreateProduct({ ...data, images: data.images || ["/images/placeholder-saree.jpg"] });
        products.unshift({ id, ...data });
        showToast("Product added", "success");
      }
      renderTable();
      closeModal();
    } catch (err) {
      showToast(err.message, "error");
    } finally {
      btn.disabled = false; btn.textContent = "Save Product";
    }
  });

  requireAdmin(async () => {
    products = await adminFetchProducts();
    renderTable();
  });

  document.querySelector("[data-logout]")?.addEventListener("click", async (e) => {
    e.preventDefault();
    const { logoutUser } = await import("/js/auth.js");
    logoutUser();
  });
</script>
</body>
</html>
