<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body data-requires-auth="true">
<div class="announce-bar">Free shipping on orders above ₹1,999</div>
<header class="navbar">
  <div class="nav-inner">
    <a href="/index.html" class="logo">Lucky<span>Collection</span></a>
    <nav class="nav-links"><a href="/index.html">Home</a><a href="/products.html">Sarees</a><a href="/about.html">About</a><a href="/contact.html">Contact</a></nav>
    <div class="nav-search" style="visibility:hidden"></div>
    <div class="nav-actions">
      <a href="/wishlist.html" class="nav-icon-btn">♥<span class="badge" data-wishlist-count style="display:none">0</span></a>
      <a href="/cart.html" class="nav-icon-btn">🛍<span class="badge" data-cart-count style="display:none">0</span></a>
      <a href="/account.html" class="nav-icon-btn" data-account-link>👤</a>
      <button class="mobile-menu-btn nav-icon-btn">☰</button>
    </div>
  </div>
</header>
<div class="mobile-drawer-overlay"></div>
<div class="mobile-drawer"><a href="/index.html">Home</a><a href="/products.html">All Sarees</a><a href="/account.html">Account</a></div>

<section class="section">
  <div class="container">
    <div class="grid account-layout">
      <aside class="account-sidebar">
        <a href="/account.html">👤 Profile</a>
        <a href="/orders.html" class="active">📦 My Orders</a>
        <a href="/wishlist.html">♥ Wishlist</a>
        <a href="#" data-logout>↪ Logout</a>
      </aside>
      <div>
        <h1 class="mb-2">My Orders</h1>
        <div id="orders-list"></div>
      </div>
    </div>
  </div>
</section>

<script type="module">
  import { initAuthUI } from "/js/auth.js";
  import { auth, onAuthStateChanged } from "/js/firebase.js";
  import { fetchUserOrders, renderOrderCard, ORDER_STATUSES } from "/js/orders.js";

  initAuthUI();

  const trackId = new URLSearchParams(location.search).get("track");

  onAuthStateChanged((user) => {
    if (!user) return;
    fetchUserOrders(user.uid).then((orders) => {
      const el = document.getElementById("orders-list");
      if (!orders.length) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h3>No orders yet</h3><p class="mb-2">When you place an order, it'll show up here.</p><a href="/products.html" class="btn btn-primary">Start Shopping</a></div>`;
        return;
      }
      el.innerHTML = "";
      orders.forEach((o) => {
        const card = renderOrderCard(o);
        if (o.id === trackId) {
          const timeline = document.createElement("div");
          timeline.className = "mt-1";
          timeline.style.cssText = "display:flex;gap:6px;flex-wrap:wrap";
          ORDER_STATUSES.filter(s => s !== "Cancelled").forEach((s) => {
            const passed = ORDER_STATUSES.indexOf(s) <= ORDER_STATUSES.indexOf(o.status);
            const chip = document.createElement("span");
            chip.className = "status-pill";
            chip.style.background = passed ? "var(--maroon)" : "var(--line)";
            chip.style.color = passed ? "#fff" : "var(--ink-soft)";
            chip.textContent = s;
            timeline.appendChild(chip);
          });
          card.appendChild(timeline);
          card.style.border = "2px solid var(--gold)";
        }
        el.appendChild(card);
      });
    });
  });
</script>
</body>
</html>
