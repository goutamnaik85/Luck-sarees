<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders — Admin — Lucky Collection</title>
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
<style>
  .admin-shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--maroon-dark); color: rgba(255,255,255,0.85); padding: var(--space-6) var(--space-4); }
  .admin-sidebar a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.1); color: #fff; }
  .admin-main { padding: var(--space-6) var(--space-7); background: var(--ivory); }
  .admin-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
  .admin-table th { text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--ink-soft); padding: 12px 14px; background: var(--ivory-deep); }
  .admin-table td { padding: 12px 14px; border-top: 1px solid var(--line); font-size: 0.88rem; }
  .status-select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--line); font-size: 0.82rem; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } .admin-sidebar { display: flex; overflow-x: auto; padding: var(--space-3); } .admin-sidebar a { white-space: nowrap; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="logo" style="color:#fff;margin-bottom:var(--space-6)">Lucky<span style="color:var(--gold-light)">Admin</span></div>
    <a href="/admin/dashboard.html">📊 Dashboard</a>
    <a href="/admin/products.html">🧵 Products</a>
    <a href="/admin/orders.html" class="active">📦 Orders</a>
    <a href="/admin/customers.html">👥 Customers</a>
    <a href="/admin/coupons.html">🏷 Coupons</a>
    <a href="/index.html">🌐 View Store</a>
    <a href="#" data-logout>↪ Logout</a>
  </aside>
  <main class="admin-main">
    <div class="flex-between mb-2">
      <h1>Orders</h1>
      <div class="flex" style="gap:10px">
        <select id="status-filter" class="status-select">
          <option value="">All Statuses</option>
          <option>Pending</option><option>Confirmed</option><option>Packed</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>
        </select>
        <button class="btn btn-outline btn-sm" id="export-csv-btn">Export CSV</button>
      </div>
    </div>
    <table class="admin-table">
      <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th></tr></thead>
      <tbody id="orders-table-body"><tr><td colspan="6" style="padding:20px">Loading…</td></tr></tbody>
    </table>
  </main>
</div>

<script type="module">
  import { requireAdmin, adminFetchOrders, adminUpdateOrderStatus, ORDER_STATUSES, exportOrdersCSV } from "/js/admin.js";
  import { formatPrice } from "/js/products.js";
  import { showToast } from "/js/script.js";

  let orders = [];

  function renderTable() {
    const filter = document.getElementById("status-filter").value;
    const filtered = filter ? orders.filter(o => o.status === filter) : orders;
    const body = document.getElementById("orders-table-body");
    if (!filtered.length) { body.innerHTML = `<tr><td colspan="6" style="padding:20px;color:var(--ink-soft)">No orders found.</td></tr>`; return; }
    body.innerHTML = filtered.map(o => `
      <tr>
        <td>#${o.id.slice(0,8).toUpperCase()}</td>
        <td>${o.address?.fullName || "—"}<br><span style="color:var(--ink-soft);font-size:0.8rem">${o.address?.phone || ""}</span></td>
        <td>${o.items?.length || 0} item(s)</td>
        <td>${formatPrice(o.totals?.total || 0)}</td>
        <td>
          <select class="status-select" data-order="${o.id}">
            ${ORDER_STATUSES.map(s => `<option value="${s}" ${s === o.status ? "selected" : ""}>${s}</option>`).join("")}
          </select>
        </td>
        <td>${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleDateString("en-IN") : "—"}</td>
      </tr>`).join("");

    body.querySelectorAll("select[data-order]").forEach(sel => {
      sel.addEventListener("change", async () => {
        await adminUpdateOrderStatus(sel.dataset.order, sel.value);
        const o = orders.find(x => x.id === sel.dataset.order);
        if (o) o.status = sel.value;
        showToast("Order status updated", "success");
      });
    });
  }

  document.getElementById("status-filter").addEventListener("change", renderTable);
  document.getElementById("export-csv-btn").addEventListener("click", () => exportOrdersCSV(orders));

  requireAdmin(async () => {
    orders = await adminFetchOrders();
    renderTable();
  });

  document.querySelector("[data-logout]")?.addEventListener("click", async (e) => {
    e.preventDefault();
    const { logoutUser } = await import("/js/auth.js");
    logoutUser();
  });
</script>
</body>
</html>
