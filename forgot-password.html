<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<header class="navbar"><div class="nav-inner"><a href="/index.html" class="logo">Lucky<span>Collection</span></a></div></header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-2">
      <h2>Reset Your Password</h2>
      <p style="margin-top:6px">We'll email you a link to reset your password.</p>
    </div>
    <form id="reset-form">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-error" id="reset-error"></div>
      <div id="reset-success" style="display:none;color:var(--success);font-size:0.88rem;margin-bottom:16px">✓ Reset link sent! Check your inbox.</div>
      <button class="btn btn-primary btn-block" type="submit" id="reset-btn">Send Reset Link</button>
    </form>
    <p class="text-center mt-2" style="font-size:0.9rem"><a href="/login.html" style="color:var(--maroon);font-weight:600">← Back to Login</a></p>
  </div>
</div>

<script type="module">
  import { resetPassword, friendlyAuthError } from "/js/auth.js";

  document.getElementById("reset-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const errEl = document.getElementById("reset-error");
    const successEl = document.getElementById("reset-success");
    const btn = document.getElementById("reset-btn");
    errEl.style.display = "none"; successEl.style.display = "none";
    btn.disabled = true; btn.innerHTML = '<span class="spinner light"></span> Sending…';
    try {
      await resetPassword(form.email.value);
      successEl.style.display = "block";
      form.reset();
    } catch (err) {
      errEl.textContent = friendlyAuthError(err.code);
      errEl.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Send Reset Link";
    }
  });
</script>
</body>
</html>
