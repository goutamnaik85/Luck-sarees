<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body data-requires-auth="true">
<header class="navbar">
  <div class="nav-inner">
    <a href="/index.html" class="logo">Lucky<span>Collection</span></a>
    <div style="font-size:0.85rem;color:var(--ink-soft)">🔒 Secure Checkout</div>
  </div>
</header>

<section class="section">
  <div class="container">
    <div class="checkout-steps">
      <div class="checkout-step done"><span class="dot">✓</span><span class="label">Cart</span></div>
      <div class="checkout-step active"><span class="dot">2</span><span class="label">Address &amp; Payment</span></div>
      <div class="checkout-step"><span class="dot">3</span><span class="label">Confirmation</span></div>
    </div>

    <div class="grid cart-layout">
      <div>
        <h3 class="mb-1">Shipping Address</h3>
        <form id="address-form">
          <div class="form-row-2">
            <div class="form-group"><label>Full Name</label><input type="text" name="fullName" required></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" name="phone" maxlength="10" required></div>
          </div>
          <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
          <div class="form-group"><label>Address</label><textarea name="line1" rows="3" required placeholder="House no., street, area"></textarea></div>
          <div class="form-row-2">
            <div class="form-group"><label>City</label><input type="text" name="city" required></div>
            <div class="form-group">
              <label>State</label>
              <select name="state" required>
                <option value="">Select State</option>
                <option>Karnataka</option><option>Tamil Nadu</option><option>Maharashtra</option><option>Andhra Pradesh</option>
                <option>Telangana</option><option>Kerala</option><option>Delhi</option><option>West Bengal</option>
                <option>Gujarat</option><option>Rajasthan</option><option>Uttar Pradesh</option><option>Other</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="max-width:200px"><label>PIN Code</label><input type="text" name="pincode" maxlength="6" required></div>
        </form>

        <h3 class="mt-2 mb-1">Payment Method</h3>
        <div style="background:var(--card);border:1px solid var(--line);border-radius:10px;padding:var(--space-5)">
          <label class="flex" style="gap:10px;align-items:center;font-weight:600"><input type="radio" checked disabled> Pay Online (UPI / Card / Net Banking / Wallet)</label>
          <p style="font-size:0.85rem;color:var(--ink-soft);margin-top:8px">Powered by Razorpay. Cash on Delivery is not available.</p>
        </div>
      </div>

      <div class="summary-card">
        <h3 class="mb-1">Order Summary</h3>
        <div id="checkout-items" style="max-height:220px;overflow-y:auto;margin-bottom:12px"></div>
        <div id="checkout-summary"></div>
        <button class="btn btn-primary btn-block mt-1" id="pay-btn">Pay Now</button>
      </div>
    </div>
  </div>
</section>

<script type="module">
  import { initAuthUI } from "/js/auth.js";
  import { getCart } from "/js/cart.js";
  import { formatPrice } from "/js/products.js";
  import { renderCheckoutSummary, submitCheckout } from "/js/checkout.js";
  import { showToast } from "/js/script.js";

  initAuthUI();

  const cart = getCart();
  if (!cart.length) window.location.href = "/cart.html";

  document.getElementById("checkout-items").innerHTML = cart.map(i => `
    <div class="flex" style="gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)">
      <img src="${i.image}" style="width:44px;height:56px;object-fit:cover;border-radius:4px">
      <div style="flex:1;font-size:0.85rem"><div>${i.name}</div><div style="color:var(--ink-soft)">Qty: ${i.qty}</div></div>
      <div style="font-size:0.88rem;font-weight:600">${formatPrice(i.price * i.qty)}</div>
    </div>`).join("");

  renderCheckoutSummary("checkout-summary");

  document.getElementById("pay-btn").addEventListener("click", async (e) => {
    e.preventDefault();
    const form = document.getElementById("address-form");
    if (!form.reportValidity()) return;
    const btn = e.currentTarget;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner light"></span> Processing…';
    try {
      await submitCheckout(form);
    } finally {
      btn.disabled = false;
      btn.textContent = "Pay Now";
    }
  });
</script>
</body>
</html>
