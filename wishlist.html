<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Wishlist — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<div class="announce-bar">Free shipping on orders above ₹1,999</div>
<header class="navbar">
  <div class="nav-inner">
    <a href="/index.html" class="logo">Lucky<span>Collection</span></a>
    <nav class="nav-links"><a href="/index.html">Home</a><a href="/products.html">Sarees</a><a href="/about.html">About</a><a href="/contact.html">Contact</a></nav>
    <div class="nav-search" style="visibility:hidden"></div>
    <div class="nav-actions">
      <a href="/wishlist.html" class="nav-icon-btn active">♥<span class="badge" data-wishlist-count style="display:none">0</span></a>
      <a href="/cart.html" class="nav-icon-btn">🛍<span class="badge" data-cart-count style="display:none">0</span></a>
      <a href="/login.html" class="nav-icon-btn" data-account-link>👤</a>
      <button class="mobile-menu-btn nav-icon-btn">☰</button>
    </div>
  </div>
</header>
<div class="mobile-drawer-overlay"></div>
<div class="mobile-drawer"><a href="/index.html">Home</a><a href="/products.html">All Sarees</a><a href="/cart.html">Cart</a><a href="/orders.html">My Orders</a></div>

<section class="section">
  <div class="container">
    <h1 class="mb-2">Your Wishlist</h1>
    <div id="wishlist-content" class="grid product-grid"></div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="grid footer-grid">
      <div><a href="/index.html" class="logo">Lucky<span>Collection</span></a></div>
      <div><h4>Shop</h4><a href="/products.html">All Sarees</a></div>
      <div><h4>Company</h4><a href="/about.html">About Us</a></div>
      <div><h4>Policies</h4><a href="/refund-policy.html">Refund Policy</a></div>
      <div><h4>Get in Touch</h4><p style="font-size:0.88rem">support@luckycollection.in</p></div>
    </div>
    <div class="footer-bottom"><span>© 2026 Lucky Collection. All rights reserved.</span></div>
  </div>
</footer>

<script type="module">
  import { initAuthUI } from "/js/auth.js";
  import { getWishlist, removeFromWishlist } from "/js/wishlist.js";
  import { addToCart } from "/js/cart.js";
  import { formatPrice } from "/js/products.js";
  import { showToast } from "/js/script.js";

  initAuthUI();

  function render() {
    const items = getWishlist();
    const root = document.getElementById("wishlist-content");
    if (!items.length) {
      root.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="icon">♥</div><h3>Your wishlist is empty</h3><p class="mb-2">Save sarees you love to shop them later.</p>
        <a href="/products.html" class="btn btn-primary">Browse Sarees</a>
      </div>`;
      return;
    }
    root.innerHTML = "";
    items.forEach((p) => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <a href="/product.html?id=${p.id}" class="thumb-wrap"><img src="${p.image}" alt="${p.name}"></a>
        <div class="info">
          <a href="/product.html?id=${p.id}"><h4>${p.name}</h4></a>
          <div class="price-row"><span class="price">${formatPrice(p.price)}</span></div>
          <div class="flex" style="gap:8px;margin-top:10px">
            <button class="btn btn-primary btn-sm" style="flex:1" data-add>Add to Cart</button>
            <button class="btn-icon" style="border:1px solid var(--line);color:var(--danger)" data-remove title="Remove">✕</button>
          </div>
        </div>`;
      card.querySelector("[data-add]").addEventListener("click", () => { addToCart(p, 1); showToast(`${p.name} added to cart`, "success"); });
      card.querySelector("[data-remove]").addEventListener("click", () => { removeFromWishlist(p.id); render(); showToast("Removed from wishlist", "info"); });
      root.appendChild(card);
    });
  }
  render();
</script>
</body>
</html>
