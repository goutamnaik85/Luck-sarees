<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Lucky Collection</title>
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<header class="navbar"><div class="nav-inner"><a href="/index.html" class="logo">Lucky<span>Collection</span></a><span style="font-size:0.82rem;color:var(--ink-soft)">Admin Console</span></div></header>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-2"><h2>Admin Login</h2><p style="margin-top:6px">Restricted access — authorized personnel only.</p></div>
    <form id="admin-login-form">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required></div>
      <div class="form-error" id="admin-login-error"></div>
      <button class="btn btn-primary btn-block" type="submit" id="admin-login-btn">Login to Dashboard</button>
    </form>
  </div>
</div>
<script type="module">
  import { loginUser, getUserProfile, friendlyAuthError } from "/js/auth.js";
  import { showToast } from "/js/script.js";

  document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const errEl = document.getElementById("admin-login-error");
    const btn = document.getElementById("admin-login-btn");
    errEl.style.display = "none";
    btn.disabled = true; btn.innerHTML = '<span class="spinner light"></span> Verifying…';
    try {
      const user = await loginUser(form.email.value, form.password.value);
      const profile = await getUserProfile(user.uid);
      if (!profile || profile.role !== "admin") {
        errEl.textContent = "This account does not have admin access.";
        errEl.style.display = "block";
        return;
      }
      window.location.href = "/admin/dashboard.html";
    } catch (err) {
      errEl.textContent = friendlyAuthError(err.code);
      errEl.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Login to Dashboard";
    }
  });
</script>
</body>
</html>
