<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Lucky Collection</title>
<meta name="theme-color" content="#6B1E3C">
<link rel="icon" href="/icons/favicon.svg">
<script src="/js/config.js"></script>
<link rel="stylesheet" href="/css/styles.css">
<link rel="stylesheet" href="/css/responsive.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body>
<header class="navbar"><div class="nav-inner"><a href="/index.html" class="logo">Lucky<span>Collection</span></a></div></header>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-2">
      <h2>Welcome Back</h2>
      <p style="margin-top:6px">Login to track orders and manage your wishlist.</p>
    </div>
    <button class="google-btn" id="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.91c1.7-1.57 2.69-3.88 2.69-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.81.54-1.84.86-3.05.86-2.35 0-4.34-1.58-5.05-3.71H.96v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.71a5.4 5.4 0 0 1 0-3.42V4.96H.96a9 9 0 0 0 0 8.08l2.99-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .96 4.96l2.99 2.33C4.66 5.16 6.65 3.58 9 3.58z"/></svg>
      Continue with Google
    </button>
    <div class="form-divider">or</div>
    <form id="login-form">
      <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
        <a href="/forgot-password.html" style="font-size:0.82rem;color:var(--teal);display:block;text-align:right;margin-top:6px">Forgot password?</a>
      </div>
      <div class="form-error" id="login-error"></div>
      <button class="btn btn-primary btn-block" type="submit" id="login-btn">Login</button>
    </form>
    <p class="text-center mt-2" style="font-size:0.9rem">New here? <a href="/register.html" style="color:var(--maroon);font-weight:600">Create an account</a></p>
  </div>
</div>

<script type="module">
  import { loginUser, loginWithGoogle, friendlyAuthError } from "/js/auth.js";

  const redirect = new URLSearchParams(location.search).get("redirect") || "/index.html";

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    const errEl = document.getElementById("login-error");
    const btn = document.getElementById("login-btn");
    errEl.style.display = "none";
    btn.disabled = true; btn.innerHTML = '<span class="spinner light"></span> Logging in…';
    try {
      await loginUser(form.email.value, form.password.value);
      window.location.href = redirect;
    } catch (err) {
      errEl.textContent = friendlyAuthError(err.code);
      errEl.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Login";
    }
  });

  document.getElementById("google-btn").addEventListener("click", async () => {
    try {
      await loginWithGoogle();
      window.location.href = redirect;
    } catch (err) {
      document.getElementById("login-error").textContent = friendlyAuthError(err.code);
      document.getElementById("login-error").style.display = "block";
    }
  });
</script>
</body>
</html>
